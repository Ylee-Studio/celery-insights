name: Publish Registry Image

run-name: Publish celery-insights image for ${{ github.sha }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-registry-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.DOCKER_REGISTRY_URL }}
  BASE_PATH: /celery-insights

jobs:
  publish:
    name: Build & Push
    runs-on: builder
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: lower
        run: |
          image_name_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name_lower=${image_name_lower}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name_lower }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        env:
          BUILDKIT_STEP_LOG_MAX_SIZE: 50000000
          BUILDKIT_STEP_LOG_MAX_SPEED: 100000000
          DOCKER_BUILDKIT: 1
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BASE_PATH=${{ env.BASE_PATH }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name_lower }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.lower.outputs.image_name_lower }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          platforms: linux/amd64
